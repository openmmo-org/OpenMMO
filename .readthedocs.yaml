# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Build the Astro Starlight site under docs/ and hand its output to Read the Docs.
build:
  os: ubuntu-24.04
  tools:
    nodejs: "22"

  commands:
    # Install dependencies
    - cd docs/ && npm ci
    # Build the site (Astro writes to docs/dist/)
    - cd docs/ && npm run build
    # Copy generated files into Read the Docs directory
    - mkdir --parents $READTHEDOCS_OUTPUT/html/
    - cp --recursive docs/dist/* $READTHEDOCS_OUTPUT/html/
