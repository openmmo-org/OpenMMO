server {
  host = "0.0.0.0"
  port = 7777
  checksumSize = 2
  rootKeyResource = "game.private.pem"
  sessionSecret = "dev-only-secret-do-not-use-in-production"
  sessionSecret = ${?OPENMMO_SESSION_SECRET}
}

db {
  host = "localhost"
  host = ${?GAME_DB_HOST}
  port = 20021
  port = ${?GAME_DB_PORT}
  name = "openmmo_game_db"
  name = ${?GAME_DB_NAME}
  user = "openmmo_game_user"
  user = ${?GAME_DB_USER}
  password = "changeMe!"
  password = ${?GAME_DB_PASSWORD}
  poolSize = 4
  poolSize = ${?GAME_DB_POOL_SIZE}
  # Applies the dev seed data in db/dev. Turn off in production.
  seedDev = true
  seedDev = ${?GAME_DB_SEED_DEV}
}
