server {
  host = "0.0.0.0"
  port = 7777
  checksumSize = 2
  rootKeyResource = "game.private.pem"
  sessionSecret = "dev-only-secret-do-not-use-in-production"
  sessionSecret = ${?OPENMMO_SESSION_SECRET}
  # Dev-diagnostics-only S2C/C2S capture taps (captures/server-{s2c,c2s}-capture.log) for
  # offline byte-diffing our wire traffic against golden real-PokeMMO captures during local,
  # burner-account clean-room protocol reversing. GAME protocol only -- LOGIN never wires this
  # (see LoginServer.kt), so no credential/session traffic is ever captured. On by default for
  # local dev; production deployments MUST set OPENMMO_DIAGNOSTICS_CAPTURE=false.
  diagnosticsCapture = true
  diagnosticsCapture = ${?OPENMMO_DIAGNOSTICS_CAPTURE}
  diagnosticsCaptureDir = "captures"
  diagnosticsCaptureDir = ${?OPENMMO_DIAGNOSTICS_CAPTURE_DIR}
}
