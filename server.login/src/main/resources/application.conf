server {
  host = "0.0.0.0"
  port = 2106
  checksumSize = 16
  rootKeyResource = "game.private.pem"
  sessionSecret = "dev-only-secret-do-not-use-in-production"
  sessionSecret = ${?OPENMMO_SESSION_SECRET}
}

db {
  host = "localhost"
  host = ${?LOGIN_DB_HOST}
  port = 20011
  port = ${?LOGIN_DB_PORT}
  name = "openmmo_login_db"
  name = ${?LOGIN_DB_NAME}
  user = "openmmo_login_user"
  user = ${?LOGIN_DB_USER}
  password = "changeMe!"
  password = ${?LOGIN_DB_PASSWORD}
  poolSize = 4
  poolSize = ${?LOGIN_DB_POOL_SIZE}
  # Applies the dev seed data in db/dev. Turn off in production.
  seedDev = true
  seedDev = ${?LOGIN_DB_SEED_DEV}
}
